target-version = 'py38'
line-length = 100

[format]
quote-style = 'preserve'

# https://docs.astral.sh/ruff/rules/
[lint]
extend-select = [
    'A', # flake8-builtins
    'ARG', # flake8-unused-arguments
    'B', # flake8-bugbear
    'C4', # flake8-comprehensions
    'DTZ', # flake8-datetimez
    'E', # pycodestyle
    'EM', # flake8-errmsg
    'F', # pyflakes
    'FURB', # refurb
    'I', # isort
    'N', # pep8-naming
    'PERF', # perflint
    'PIE', # flake8-pie
    'PL', # pylint
    'PTH', # flake8-use-pathlib
    'RET', # flake8-return
    'RUF', # ruff
    'S', # flake8-bandit
    'SIM', # flake8-simplify
    'SLF', # flake8-self
    'TC', # flake8-type-checking
    'TRY', # tryceratops
    'UP', # pyupgrade
    'W', # pycodestyle
]
ignore = [
    'S404', # suspicious-subprocess-import
    'S603', # subprocess-without-shell-equals-true
    'S607', # start-process-with-partial-path
]
preview = true
